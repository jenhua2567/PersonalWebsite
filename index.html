<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jenny Hua</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Open Sans', sans-serif;
      background-color: #ffffff;
      color: #800000;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: background 0.1s ease;
    }

    .container {
      text-align: center;
      padding: 2rem;
      max-width: 680px;
    }

    .divider {
      width: 60px;
      height: 2px;
      background-color: #800000;
      margin: 1.5rem auto;
    }

    h1 {
      font-size: 3rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #800000;
    }

    .title {
      font-size: 1rem;
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #800000;
      opacity: 0.75;
    }

    .message {
      font-size: 1.05rem;
      font-weight: 300;
      color: #5a0000;
      line-height: 1.8;
      margin-top: 1.5rem;
    }

    .badge {
      display: inline-block;
      margin-top: 2.5rem;
      padding: 0.5rem 1.4rem;
      border: 1px solid #800000;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #800000;
    }

    .linkedin-link {
      display: inline-block;
      margin-top: 1.2rem;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #800000;
      text-decoration: none;
      opacity: 0.7;
      transition: opacity 0.2s ease;
    }

    .linkedin-link:hover {
      opacity: 1;
    }

    footer {
      position: fixed;
      bottom: 1.5rem;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #800000;
      opacity: 0.4;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Jenny Hua</h1>
    <div class="divider"></div>
    <p class="title">Go-to-Market Strategist</p>
    <p class="message">
      Something great is on the way.<br />
      This site is currently under construction.
    </p>
    <div class="badge">Coming Soon</div>
    <br />
    <a class="linkedin-link" href="https://ca.linkedin.com/in/jenny-hua" target="_blank" rel="noopener noreferrer">LinkedIn</a>
  </div>
  <footer>&copy; 2026 Jenny Hua</footer>

  <script>
    document.addEventListener('mousemove', function(e) {
      var x = (e.clientX / window.innerWidth) * 100;
      var y = (e.clientY / window.innerHeight) * 100;
      document.body.style.background =
        'radial-gradient(circle at ' + x + '% ' + y + '%, #fff0f0 0%, #ffffff 60%)';
    });

    document.addEventListener('mouseleave', function() {
      document.body.style.background = '#ffffff';
    });
  </script>
</body>
</html>
